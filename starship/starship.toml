# ~/.config/starship.toml

# https://starship.rs/presets/catppuccin-powerline

"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 1500

format = """
[](fg:surface0 bg:red)\
$os\
$username\
[](bg:peach fg:red)\
$directory\
[](bg:yellow fg:peach)\
${custom.git}\
${custom.sapling}\
${custom.jujutsu}\
[](fg:yellow bg:green)\
$nodejs\
$python\
[](fg:green bg:sapphire)\
$shell\
[](fg:sapphire bg:lavender)\
$time\
[](fg:lavender bg:surface0)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_mocha'

[shell]
disabled = false
style = "bg:sapphire"
format = "[ $indicator ]($style)"
fish_indicator = '🐟'
zsh_indicator = '💤'

[os]
disabled = false
style = "bg:red fg:crust"
format = "[ $symbol]($style)"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
Macos = "󰀵"
Linux = "󰌽"
Arch = "󰣇"
Debian = "󰣚"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user ]($style)'
aliases = {"devonmars" = "devon"}

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = "󰝚 "
"Pictures" = " "
"Developer" = "󰲋 "
"~/asimov/asimov-mui" = "amui"
"~/asimov/sv" = "seqviz"
"~/asimov/ku-sapling" = "ku"

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.git]
description = "Git branch and status (only in pure git repos)"
command = """branch=$(git symbolic-ref --short HEAD 2>/dev/null || git rev-parse --short HEAD 2>/dev/null); dirty=$(git status --porcelain 2>/dev/null | head -1); if [ -n "$dirty" ]; then echo "$branch !"; else echo "$branch"; fi"""
when = "test -d .git && ! test -d .jj && ! test -d .sl"
symbol = ""
style = "bg:yellow fg:crust"
format = "[[ $symbol $output ](fg:crust bg:yellow)]($style)"

[custom.sapling]
description = "Sapling SCM current commit"
command = "sl log -r . -T '{ifeq(phase,\"public\",if(activebookmark,activebookmark,if(remotebookmarks,remotebookmarks,\"main\")),desc|firstline)}{ifeq(phase,\"public\",ifcontains(rev,revset(\"remote/main\"),\" 🔹\",\" 🔸\"),\"\")}' 2>/dev/null | sed 's|^remote/||' | awk '{if(length>40) print substr($0,1,37)\"…\"; else print}'"
when = "test -d .sl"
symbol = "🌱"
style = "bg:yellow fg:crust"
format = "[[ $symbol $output ](fg:crust bg:yellow)]($style)"

[custom.jujutsu]
description = "Jujutsu VCS current change"
command = "jj log -r @ --no-graph -T 'if(immutable, concat(if(bookmarks, bookmarks.join(\", \"), \"main\")), if(description, description.first_line(), change_id.shortest(8)))' 2>/dev/null | awk '{if(length>40) print substr($0,1,37)\"…\"; else print}'"
when = "test -d .jj"
symbol = "🥷" # 🥋
style = "bg:yellow fg:crust"
format = "[[ $symbol $output ](fg:crust bg:yellow)]($style)"

[nodejs]
disabled = false
symbol = "🚀🐢"
style = "bg:green"
format = '[[ $symbol ($version) ](fg:crust bg:green)]($style)'

[python]
disabled = true
symbol = "🐍"
style = "bg:green"
format = '[[ $symbol (\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ ⏱️ $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[󱍢](bold fg:green)' # ❯ 󰼂 󰊠 󱍢 󰮯 󱙵 󱀆 󱓞 󱙳 󰯉 󰚀
error_symbol = '[󰈸](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = " ⏲️ $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"
